name: Weekly Build Health Check

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  weekly-build:
    name: Weekly Production Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build